{{define "content"}}
<div class="container">
  <div class="posts-list">
    {{range $index := 5}}
    <div class="post-item">
      <div class="post-rank">{{$index}}</div>
      <div class="post-content">
        <div class="post-title">
          Show HN: Built a Hacker News Clone in Go
          <a href="#" class="post-link">Title</a>
          <span class="post-domain">localhost.com</span>
          <a href="/post/12111" class="post-link">Joseph Abah</a>
        </div>
        <div class="post-meta">
          <span class="points">2 points</span>
          by <a href="/user/222" class="author">AJ</a>
          <span class="time">1 hour ago</span>
          <a href="/post/12111/comments" class="comments-link">324 comments</a>
        </div>
      </div>
    </div>
    {{end}}
  </div>

  <div class="pagination">
    <a href="/?page=1" class="more-link">Prev</a>
    <a href="/?page=2" class="more-link">Next</a>
  </div>

</div>
{{end}}
